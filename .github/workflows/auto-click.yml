name: 139 云手机自动点击

on:
  schedule:
    - cron: '0 * * * *'
  
  workflow_dispatch:
    inputs:
      note:
        description: '备注说明 (可选)'
        required: false
        default: '手动执行'

jobs:
  auto-click:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 安装 Chrome 浏览器
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: 执行自动点击
      env:
        COOKIE_SMID: ${{ secrets.COOKIE_SMID }}
        COOKIE_THUMBCACHE: ${{ secrets.COOKIE_THUMBCACHE }}
      run: |
        echo "开始执行自动点击任务..."
        echo "执行时间：$(date)"
        python auto_click.py
        echo "任务完成"
