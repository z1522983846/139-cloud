name: 139 云手机自动点击

on:
  schedule:
    - cron: '0 * * * *'
  
  workflow_dispatch:
    inputs:
      note:
        description: 'Test run'
        required: false
        default: 'manual'

jobs:
  auto-click:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install selenium
      run: |
        pip install selenium==4.16.0

    - name: Setup Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Run automation
      env:
        COOKIE_SMID: ${{ secrets.COOKIE_SMID }}
        COOKIE_THUMBCACHE: ${{ secrets.COOKIE_THUMBCACHE }}
        CHROME_BIN: /usr/bin/chromium-browser
      run: |
        python auto_click.py
