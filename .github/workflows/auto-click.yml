name: 139 云手机自动点击

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      note:
        description: '备注说明 (可选)'
        required: false
        default: 'manual'

jobs:
  auto-click:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install selenium
      run: |
        pip install selenium==4.16.0

    - name: Install Chromium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Run automation
      env:
        COOKIE_SMID: ${{ secrets.COOKIE_SMID }}
        COOKIE_THUMBCACHE: ${{ secrets.COOKIE_THUMBCACHE }}
      run: |
        echo "当前工作目录：$(pwd)"
        python auto_click.py
        echo "截图文件列表："
        ls -la *.png || echo "未找到 PNG 文件"

    - name: Upload screenshots
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: screenshots-run-${{ github.run_number }}
        path: |
          01_before_cookie.png
          02_after_refresh.png
          03_after_white_dot.png
          04_after_exit.png
          05_final_page.png
          06_error.png
        retention-days: 7
        if-no-files-found: ignore
